name: chest_disease_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Core & Utils ---
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  dartz: ^0.10.1
  package_info_plus: ^8.3.0
  json_annotation: ^4.8.1  # Important for code generation

  # --- UI Components ---
  fluttertoast: ^8.2.12
  animated_toggle_switch: ^0.8.4
  toggle_switch: ^2.3.0
  table_calendar: ^3.2.0
  shimmer: ^3.0.0
  bottom_picker: ^3.0.0
  flutter_svg: ^2.0.17
  lottie: ^3.2.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2

  # --- State Management ---
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # --- Networking ---
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0
  signalr_netcore: ^1.4.3

  # --- Dependency Injection ---
  get_it: ^8.0.3
  injectable: ^2.5.0

  # --- Hardware & Services ---
  image_picker: ^1.1.2
  file_picker: ^9.2.1
  open_file: ^3.5.10
  permission_handler: ^11.4.0
  google_maps_flutter: ^2.10.1
  local_auth: ^2.3.0

  # --- Local Storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # --- Firebase & Notifications ---
  onesignal_flutter: ^5.1.2
  firebase_core: ^2.32.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # --- Code Generation ---
  build_runner: ^2.4.8
  json_serializable: ^6.7.1 # Needed for json_annotation
  hive_generator: ^2.0.1
  injectable_generator: ^2.6.0
  flutter_launcher_icons: ^0.14.3
  intl_utils: ^2.8.3

# --- Configuration Section ---

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_intl:
  enabled: true

flutter:
  uses-material-design: true
  generate: true 

  assets:
    - assets/image/
    - assets/svg/
    - assets/lotties/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf